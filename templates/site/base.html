{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}notaws{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    </head>
    <body>
        {% if user.is_authenticated %}
        <header class="topbar">
            <a class="brand" href="{% url 'welcome' %}">notaws</a>
            <nav>
                <a href="{% url 'welcome' %}">Home</a>
                <a href="{% url 'ec2_dashboard:index' %}">Dashboard</a>
            </nav>
            <div class="auth">
                <span>{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-secondary" type="submit">
                        Logout
                    </button>
                </form>
            </div>
        </header>
        {% endif %}
        <main class="{% if not user.is_authenticated %}auth-main{% endif %}">
            {% if messages %}
            <ul class="messages">
                {% for m in messages %}
                <li class="msg msg-{{ m.tags }}">{{ m }}</li>
                {% endfor %}
            </ul>
            {% endif %} {% block content %}{% endblock %}
        </main>
    </body>
</html>
