{% extends "ec2/base.html" %}
{% block title %}New Instance{% endblock %}
{% block content %}
<h1>New Instance</h1>
<form method="post">
    {% csrf_token %}
    <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" placeholder="my-vm">
    </div>
    <div class="field">
        <label for="image">Choose Machine</label>
        <select id="image" name="image" required>
            {% for img in images %}
                <option value="{{ img.pk }}">{{ img.name }} ({{ img.active_build.tag }})</option>
            {% empty %}
                <option disabled>No images available — admin must publish a build first</option>
            {% endfor %}
        </select>
    </div>
    <div class="field">
        <label for="cpu">CPUs</label>
        <input id="cpu" type="number" name="cpu" min="1" value="1" required>
    </div>
    <div class="field">
        <label for="ram">RAM (GB)</label>
        <input id="ram" type="number" name="ram" min="1" value="1" required>
    </div>
    <div class="field">
        <label for="storage">Storage (GB)</label>
        <input id="storage" type="number" name="storage" min="1" value="10" required>
    </div>
    <button type="submit" class="btn">Launch</button>
    <a href="{% url 'ec2_instances:list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
