{% extends "ec2/base.html" %}
{% load static %}
{% block title %}Terminal — {{ instance }}{% endblock %}
{% block content %}
<link rel="stylesheet" href="{% static 'vendor/xterm/xterm.css' %}">
<link rel="stylesheet" href="{% static 'css/ec2/instances.css' %}">

<p><a href="{% url 'ec2_instances:detail' instance.pk %}">&larr; back</a></p>
<h1>Terminal: {{ instance.name|default:instance.short_id }}</h1>

<div id="terminal-app"
     data-ws-url="{% if request.is_secure %}wss{% else %}ws{% endif %}://{{ request.get_host }}/ws/instances/{{ instance.pk }}/terminal/"
     data-detail-url="{% url 'ec2_instances:detail' instance.pk %}">
    <div class="terminal-toolbar">
        <span class="terminal-status">connecting…</span>
        <span class="spacer"></span>
        <button type="button" class="btn btn-secondary" data-action="fullscreen">Fullscreen</button>
        <button type="button" class="btn btn-secondary" data-action="disconnect">Disconnect</button>
    </div>
    <div class="terminal-host"></div>
</div>

<script src="{% static 'vendor/xterm/xterm.js' %}"></script>
<script src="{% static 'vendor/xterm/xterm-addon-fit.js' %}"></script>
<script src="{% static 'js/ec2/instances.js' %}"></script>
{% endblock %}
