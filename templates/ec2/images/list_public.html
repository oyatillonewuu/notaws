{% extends "ec2/base.html" %}
{% block title %}Images{% endblock %}
{% block content %}
<h1>Images</h1>
<table>
    <thead><tr><th>Name</th></tr></thead>
    <tbody>
        {% for img in images %}
            <tr>
                <td>{{ img.name }}</td>
            </tr>
            {% empty %}<tr><td colspan="4"><em>No images yet.</em></td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
